<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVST Visualization Home</title>
    <link rel="stylesheet" href="styles/header.css">
    <style>
        body {
            background: #E8F5BD;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #222;
        }
        .home-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .home-container h2 {
            color: #3a5a1c;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .home-container p {
            color: #444;
            font-size: 1.08em;
            margin-bottom: 30px;
            text-align: center;
            max-width: 500px;
        }
        .home-links {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 20px;
            justify-content: center;
        }
        .home-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 240px;
            height: 150px;
            background: #1B211A;
            border-radius: 18px;
            box-shadow: 0 2px 16px rgba(27,33,26,0.15);
            text-decoration: none;
            color: #EBD5AB;
            font-size: 1.15em;
            font-weight: 600;
            transition: box-shadow 0.2s, transform 0.2s, background 0.2s, border-color 0.2s;
            border: 2px solid #8BAE66;
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
        }
        .home-link:hover {
            box-shadow: 0 4px 24px rgba(98,129,65,0.25);
            background: #628141;
            color: #EBD5AB;
            transform: translateY(-4px) scale(1.03);
            border-color: #EBD5AB;
        }
        .home-link .icon {
            font-size: 1.8em;
            margin-bottom: 8px;
        }
        .home-link .desc {
            font-size: 0.75em;
            color: #8BAE66;
            font-weight: 400;
            margin-top: 8px;
            text-align: center;
            padding: 0 8px;
        }
        .home-link:hover .desc {
            color: #EBD5AB;
        }
        @media (max-width: 700px) {
            .home-links {
                flex-direction: column;
                gap: 20px;
            }
            .home-link {
                width: 90vw;
                max-width: 320px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>EVST PROJECT</h1>
    </header>
    <div class="home-container">
        <h2>Click below to get started</h2>
        <p>
            
        </p>
        <div class="home-links">
            <a class="home-link" href="vis/pollutionviz.html">
                <span class="icon"></span>
                Pollution Viz
                <span class="desc">Compare live pollution levels using a 3D particle simulation.</span>
            </a>
            <a class="home-link" href="vis/fossil-fuel.html">
                <span class="icon"></span>
                Fossil Fuel Viz
                <span class="desc">See oil, gas, coal, and NYC volumes side by side.</span>
            </a>
            </a>
            <a class="home-link" href="vis/faq.html">
                <span class="icon"></span>
                Why should I care?
                <span class="desc">Frequently asked questions about air quality.</span>
            </a>
        </div>
    </div>
</body>
</html>
